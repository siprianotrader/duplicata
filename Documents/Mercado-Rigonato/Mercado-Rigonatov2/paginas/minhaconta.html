<!-- Modal Cadastro -->
<div class="modal fade" id="modalCadastro" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📝 Criar Conta</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form onsubmit="fazerCadastro(event)">
                    <div class="mb-3">
                        <label for="cadastro-nome" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="cadastro-nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="cadastro-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="cadastro-email" required>
                    </div>
                    <div class="mb-3">
                        <label for="cadastro-telefone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="cadastro-telefone" required>
                    </div>
                    <div class="mb-3">
                        <label for="cadastro-senha" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="cadastro-senha" required minlength="6">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Criar Conta</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">
                        Já tem conta? <a href="#" onclick="mostrarLogin()">Fazer Login</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
