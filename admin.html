<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Frank Motos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-bicycle"></i> Frank Motos
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house-door"></i> Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="formulario.html"><i class="bi bi-pencil-square"></i> Nova Duplicata</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="clientes.html"><i class="bi bi-people"></i> Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="admin.html"><i class="bi bi-gear"></i> Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="index.html" class="text-warning text-decoration-none">Início</a></li>
                        <li class="breadcrumb-item active">Área Administrativa</li>
                    </ol>
                </nav>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="card shadow mb-4 border-warning">
                    <div class="card-header bg-warning">
                        <h4 class="mb-0"><i class="bi bi-gear"></i> Configurações do Sistema</h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card mb-3">
                                    <div class="card-header bg-dark text-white">
                                        <i class="bi bi-building"></i> Dados do Credor (Frank Motos)
                                    </div>
                                    <div class="card-body">
                                        <form id="formConfigCredor">
                                            <div class="mb-3">
                                                <label class="form-label">Nome do Credor</label>
                                                <input type="text" class="form-control" id="configNomeCredor" value="FRANKELLEY STEFANO ALVES AZEVEDO">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">CNPJ</label>
                                                <input type="text" class="form-control" id="configCnpj" value="33.917.740/0001-46">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Inscrição Estadual</label>
                                                <input type="text" class="form-control" id="configIE" value="0000001109367">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Contato</label>
                                                <input type="text" class="form-control" id="configContato" value="(69) 98494-0207">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Endereço</label>
                                                <textarea class="form-control" id="configEndereco" rows="2">AV: MIGUEL VIEIRA FERREIRA, 5454 - Cidade Alta</textarea>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Cidade/UF</label>
                                                <input type="text" class="form-control" id="configCidade" value="ROLIM DE MOURA - RO">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">CEP</label>
                                                <input type="text" class="form-control" id="configCep" value="76940-000">
                                            </div>
                                            <button type="submit" class="btn btn-warning">Salvar Alterações</button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="card mb-3">
                                    <div class="card-header bg-dark text-white">
                                        <i class="bi bi-graph-up"></i> Estatísticas
                                    </div>
                                    <div class="card-body">
                                        <ul class="list-group">
                                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                                Total de Duplicatas
                                                <span class="badge bg-warning rounded-pill" id="totalDuplicatas">0</span>
                                            </li>
                                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                                Duplicatas Pagas
                                                <span class="badge bg-success rounded-pill" id="totalPagas">0</span>
                                            </li>
                                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                                Duplicatas Pendentes
                                                <span class="badge bg-danger rounded-pill" id="totalPendentes">0</span>
                                            </li>
                                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                                Valor Total (R$)
                                                <span class="badge bg-primary rounded-pill" id="valorTotal">R$ 0,00</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="card">
                                    <div class="card-header bg-dark text-white">
                                        <i class="bi bi-tools"></i> Ferramentas
                                    </div>
                                    <div class="card-body">
                                        <button class="btn btn-danger mb-2 w-100" onclick="limparTodosDados()">
                                            <i class="bi bi-trash"></i> Limpar Todos os Dados
                                        </button>
                                        <button class="btn btn-success mb-2 w-100" onclick="exportarDados()">
                                            <i class="bi bi-download"></i> Exportar Dados (Backup)
                                        </button>
                                        <button class="btn btn-info mb-2 w-100" onclick="importarDados()">
                                            <i class="bi bi-upload"></i> Importar Dados
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button onclick="topFunction()" id="btnTopo" class="btn btn-warning" title="Voltar ao topo">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
